<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0e1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Siam Arena"/>
<title>Siam Arena - World Cup 2026 লাইভ</title>
<meta name="description" content="World Cup 2026 লাইভ স্ট্রিমিং বাংলায়। সকল চ্যানেল একটি প্ল্যাটফর্মে।">

<!-- HLS.js - দ্রুত লোড করুন -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--card:#141d2e;
  --gold:#f5c518;--live:#ff3d3d;--green:#00c853;
  --text:#f0f4ff;--muted:#8892a4;--border:#1e2d42;
  --primary:#667eea;--secondary:#764ba2;
}

html,body{height:100%;overflow:hidden;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh}

/* স্কেলেটন লোডিং */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--bg3) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* মেইন লেআউট */
.layout{display:grid;grid-template-columns:1fr minmax(300px,20%);grid-template-rows:60px 1fr 60px;height:100vh;gap:8px;padding:8px;background:#000;overflow:hidden}

/* টপ বার */
.top-bar{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);z-index:100}

.logo{font-size:20px;font-weight:bold;color:var(--gold);letter-spacing:2px}

.top-controls{display:flex;gap:12px;align-items:center}

.btn{padding:8px 16px;background:var(--primary);border:none;border-radius:6px;color:white;cursor:pointer;font-size:14px;transition:all 0.3s;font-weight:500}

.btn:hover{background:var(--secondary);transform:translateY(-2px)}

.btn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* প্লেয়ার সেকশন */
.player-section{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:8px;overflow:hidden;border-radius:8px;background:var(--card);border:1px solid var(--border)}

.player-wrap{position:relative;width:100%;flex:1;background:#000;display:flex;align-items:center;justify-content:center;border-radius:8px;overflow:hidden}

.player-wrap video{width:100%;height:100%;object-fit:contain}

.player-controls{display:flex;gap:8px;padding:12px;background:rgba(0,0,0,0.5);border-top:1px solid var(--border);justify-content:space-between;align-items:center}

.ctrl-btn{width:36px;height:36px;background:rgba(255,255,255,0.1);border:none;color:white;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}

.ctrl-btn:hover{background:rgba(255,255,255,0.2)}

.channel-info{padding:12px;background:var(--bg2);border-bottom:1px solid var(--border)}

.ch-current{font-size:14px;color:var(--muted);margin-bottom:4px}

.ch-name{font-size:16px;font-weight:bold;color:var(--text)}

/* সাইডবার */
.sidebar{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:8px;overflow:hidden;border-radius:8px;background:var(--card);border:1px solid var(--border)}

.sidebar-header{padding:12px;background:linear-gradient(135deg, var(--primary), var(--secondary));font-weight:bold;color:white;text-align:center}

.ch-grid{flex:1;overflow-y:auto;padding:8px;display:grid;gap:8px}

.ch-card{padding:10px;background:var(--bg2);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;border:1px solid var(--border);transition:all 0.3s}

.ch-card:hover{background:var(--bg3);border-color:var(--primary)}

.ch-icon{font-size:20px;flex-shrink:0}

.ch-info{flex:1;overflow:hidden}

.ch-name{font-size:12px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ch-sub{font-size:10px;color:var(--muted)}

/* লাইভ ব্যাজ */
.badge-live{color:var(--live);font-weight:bold}

.badge-app{color:var(--green)}

/* বটম বার */
.bottom-bar{grid-column:1/3;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}

.stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}

.stat-value{color:var(--gold);font-weight:bold}

/* স্ক্রলবার কাস্টমাইজেশন */
.ch-grid::-webkit-scrollbar{width:6px}
.ch-grid::-webkit-scrollbar-track{background:var(--bg2)}
.ch-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ch-grid::-webkit-scrollbar-thumb:hover{background:var(--primary)}

/* মোডাল */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;animation:fadeIn 0.3s}

.modal.show{display:flex}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal-content{background:var(--card);border-radius:12px;padding:24px;max-width:500px;width:90%;border:1px solid var(--border);animation:slideUp 0.3s}

@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,255,255,0.1);border:none;color:white;border-radius:50%;cursor:pointer;font-size:18px}

/* রেসপন্সিভ */
@media(max-width:1024px){
  .layout{grid-template-columns:1fr;grid-template-rows:60px 1fr 60px}
  .top-bar{grid-column:1}
  .bottom-bar{grid-column:1}
  .player-section{grid-column:1}
  .sidebar{grid-column:1;max-height:200px}
}

@media(max-width:640px){
  .layout{padding:4px;gap:4px}
  .top-bar{padding:8px 12px}
  .btn{padding:6px 12px;font-size:12px}
  .ch-card{padding:8px}
  .ch-name{font-size:11px}
}

/* লোডিং স্পিনার */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}

@keyframes spin{to{transform:rotate(360deg)}}

/* লাইভ ইন্ডিকেটর */
.live-indicator{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,61,61,0.2);border:1px solid var(--live);border-radius:12px;font-size:12px;color:var(--live);font-weight:bold;animation:pulse 1s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* বিজ্ঞাপন স্পেস */
.ad-space{padding:12px;background:rgba(102,126,234,0.1);border-radius:6px;text-align:center;font-size:12px;color:var(--muted);margin:8px}
</style>
</head>
<body>

<!-- টপ বার -->
<div class="top-bar">
  <div class="logo">🎬 Siam Arena</div>
  <div class="top-controls">
    <span class="live-indicator" id="liveStatus">🔴 লাইভ</span>
    <span class="stat">👁️ <span class="stat-value" id="viewerCount">0</span></span>
    <button class="btn btn-icon" title="সেটিংস" onclick="alert('সেটিংস আসছে শীঘ্রই')">⚙️</button>
    <button class="btn btn-icon" title="পূর্ণ স্ক্রিন" onclick="toggleFS()">⛶</button>
  </div>
</div>

<!-- প্লেয়ার সেকশন -->
<div class="player-section">
  <div class="player-wrap" id="playerWrap">
    <video id="player" controls style="display:none;width:100%;height:100%"></video>
    <div class="skeleton" style="width:100%;height:100%;position:absolute"></div>
  </div>
  <div class="player-controls">
    <div>
      <button class="ctrl-btn" title="পুনরায় চালু করুন" onclick="document.getElementById('player').play()">▶</button>
      <button class="ctrl-btn" title="থামান" onclick="document.getElementById('player').pause()">⏸</button>
    </div>
    <button class="ctrl-btn" onclick="toggleFS()" title="পূর্ণ স্ক্রিন">⛶</button>
  </div>
  <div class="channel-info">
    <div class="ch-current">বর্তমান চ্যানেল</div>
    <div class="ch-name" id="currentChannel">চ্যানেল নির্বাচন করুন</div>
  </div>
</div>

<!-- সাইডবার -->
<div class="sidebar">
  <div class="sidebar-header">📺 চ্যানেল তালিকা</div>
  <div class="ch-grid" id="channelGrid">
    <div style="padding:20px;text-align:center">
      <div class="spinner"></div>
      <div style="margin-top:8px;font-size:12px">চ্যানেল লোড হচ্ছে...</div>
    </div>
  </div>
</div>

<!-- বটম বার -->
<div class="bottom-bar">
  <div style="display:flex;gap:20px">
    <div class="stat">📊 <span class="stat-value" id="streamInfo">স্ট্রিম প্রস্তুত</span></div>
    <div class="stat">⚡ <span class="stat-value" id="qualityInfo">HD</span></div>
  </div>
  <div style="font-size:12px;color:var(--muted)">
    Siam Arena v2.0 | World Cup 2026
  </div>
</div>

<!-- বিজ্ঞাপন স্পেস -->
<div class="ad-space" id="adContainer" style="display:none">
  🎯 বিজ্ঞাপন এলাকা
</div>

<!-- স্ক্রিপ্ট -->
<script>
// ===== পারফরম্যান্স অপটিমাইজেশন =====

// স্ট্যাটে ম্যানেজমেন্ট
const STATE = {
  currentStream: null,
  hls: null,
  viewers: Math.floor(Math.random() * 50000) + 10000,
  channels: [],
  autoScaling: true,
  maxConnections: 100000
};

// ===== Fullscreen ফাংশন =====
function toggleFS(){
  const wrap = document.querySelector('.player-wrap');
  const vid = document.getElementById('player');
  
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    if(wrap.requestFullscreen) wrap.requestFullscreen();
    else if(wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    else if(vid.webkitEnterFullscreen) vid.webkitEnterFullscreen();
  } else {
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

// ===== চ্যানেল প্লে করুন =====
function playC(name, url) {
  const video = document.getElementById('player');
  const currentEl = document.getElementById('currentChannel');
  
  currentEl.textContent = name;
  
  // পূর্ববর্তী স্ট্রিম পরিষ্কার করুন
  if(STATE.hls){
    STATE.hls.destroy();
    STATE.hls = null;
  }
  
  // M3U8 URL এর জন্য HLS ব্যবহার করুন
  if(url.includes('.m3u8') || url.includes('.m3u')){
    if(Hls.isSupported()){
      STATE.hls = new Hls();
      STATE.hls.loadSource(url);
      STATE.hls.attachMedia(video);
      STATE.hls.on(Hls.Events.MANIFEST_PARSED, function(){
        video.play().catch(e => console.log('Auto-play blocked:', e));
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      video.play().catch(e => console.log('Auto-play blocked:', e));
    }
  } else {
    // সরাসরি ভিডিও স্ট্রিম
    video.src = url;
    video.play().catch(e => console.log('Auto-play blocked:', e));
  }
  
  document.querySelector('.skeleton').style.display = 'none';
  video.style.display = 'block';
  
  STATE.currentStream = url;
  updateStats();
}

// ===== চ্যানেল লোড করুন =====
async function loadChannels() {
  try {
    const response = await fetch('channels.json?v=' + Date.now(), {
      signal: AbortSignal.timeout(5000)
    });
    
    if(!response.ok) throw new Error('Failed to load');
    
    const data = await response.json();
    STATE.channels = [...(data.bangladeshi || []), ...(data.sports || [])];
    renderChannels();
  } catch(err) {
    console.warn('চ্যানেল লোড ব্যর্থ:', err);
    loadDefaultChannels();
  }
}

// ডিফল্ট চ্যানেল
function loadDefaultChannels() {
  STATE.channels = [
    {name: 'বিটিভি', icon: '📺', url: 'https://your-stream-url/btv.m3u8'},
    {name: 'RTV', icon: '📺', url: 'https://your-stream-url/rtv.m3u8'},
    {name: 'চ্যানেল আই', icon: '📺', url: 'https://your-stream-url/channeli.m3u8'},
    {name: 'এন্টারিক্স', icon: '📺', url: 'https://your-stream-url/entv.m3u8'}
  ];
  renderChannels();
}

// ===== চ্যানেল রেন্ডার করুন =====
function renderChannels() {
  const grid = document.getElementById('channelGrid');
  
  if(!STATE.channels.length) {
    loadDefaultChannels();
    return;
  }
  
  grid.innerHTML = STATE.channels.map(ch => `
    <div class="ch-card" onclick="playC('${escapeHtml(ch.name)}','${escapeHtml(ch.url)}')">
      <div class="ch-icon">${ch.icon || '📺'}</div>
      <div class="ch-info" style="flex:1;overflow:hidden">
        <div class="ch-name">${escapeHtml(ch.name)}</div>
        <div class="ch-sub badge-live">🔴 লাইভ</div>
      </div>
    </div>
  `).join('');
}

// ===== স্ট্যাটিস্টিক্স আপডেট করুন =====
function updateStats() {
  STATE.viewers = Math.floor(Math.random() * 50000) + 10000;
  document.getElementById('viewerCount').textContent = STATE.viewers.toLocaleString('bn-BD');
  
  if(STATE.currentStream) {
    document.getElementById('streamInfo').textContent = '🟢 সংযুক্ত';
  }
}

// ===== সাহায্যকারী ফাংশন =====
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== ট্যাব লুকানো হলে পজ করুন =====
document.addEventListener('visibilitychange', function(){
  const vid = document.getElementById('player');
  if(document.hidden && vid && !vid.paused) vid.pause();
});

window.addEventListener('blur', function(){
  const vid = document.getElementById('player');
  if(vid && !vid.paused) vid.pause();
});

// ===== মেমোরি অপটিমাইজেশন =====
window.addEventListener('unload', function(){
  if(STATE.hls) {
    STATE.hls.destroy();
    STATE.hls = null;
  }
  STATE.channels = [];
});

// ===== ইনিশিয়ালাইজেশন =====
document.addEventListener('DOMContentLoaded', function(){
  console.log('⚡ Siam Arena লোড হচ্ছে...');
  
  // চ্যানেল লোড করুন
  loadChannels();
  
  // দর্শক সংখ্যা আপডেট করুন
  setInterval(updateStats, 5000);
  updateStats();
  
  // বিজ্ঞাপন লোড করুন (বিলম্বিত)
  setTimeout(() => {
    loadExternalAds();
  }, 2000);
  
  console.log('✅ সম্পূর্ণভাবে লোড হয়েছে');
});

// ===== বিজ্ঞাপন লোড করুন (আলসি) =====
function loadExternalAds() {
  // Effective CPM Network স্ক্রিপ্ট লোড করুন
  const adScripts = [
    'https://pl29720773.effectivecpmnetwork.com/3e/47/50/3e4750cf8256484cb56b6afc9dc4f0d6.js',
    'https://pl29720774.effectivecpmnetwork.com/57/a6/fe/57a6fec9ee5916ab7b6d572bfbe545e5.js'
  ];
  
  adScripts.forEach(src => {
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.defer = true;
    document.body.appendChild(script);
  });
}

// ===== Analytics (ঐচ্ছিক) =====
// GoatCounter অ্যানালিটিক্স
if(typeof window.goatcounter === 'undefined'){
  window.goatcounter = {path: location.pathname, referrer: ''};
  const script = document.createElement('script');
  script.src = '//gc.zgo.at/count.js';
  script.async = true;
  document.head.appendChild(script);
}
</script>

</body>
</html>
